<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - TecniTrack</title>
    <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg">
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="../../css/clientes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../../js/auth.js"></script>
</head>

<body>

    <!-- Barra lateral -->
    <div class="sidebar"></div>

    <div class="content">
        <section class="panel-section active-section">
            <h1>Clientes</h1>

            <div class="cards clientes-cards">
                <div class="card">
                    <h3 id="totalClientes">0</h3>
                    <p>Total Clientes</p>
                </div>

                <div class="card">
                    <h3 id="clientesActivos">0</h3>
                    <p>Activos</p>
                </div>

                <div class="card">
                    <h3 id="clientesInactivos">0</h3>
                    <p>Inactivos</p>
                </div>

                <div class="card">
                    <h3 id="clientesNuevos">0</h3>
                    <p>Nuevos</p>
                </div>
            </div>

            <div class="clientes-grid">
                <div class="cliente-formulario">
                    <h2>Registrar Cliente</h2>

                    <div class="form-grid-clientes">
                        <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
                        <input type="email" id="correoCliente" placeholder="Correo electrónico">
                        <input type="text" id="telefonoCliente" placeholder="Teléfono 7777-8888" maxlength="9">
                        <select id="estadoCliente">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>

                    <div class="acciones-clientes">
                        <button id="btnGuardarCliente">Guardar Cliente</button>
                    </div>
                </div>

                <div class="cliente-resumen">
                    <div class="resumen-box">
                        <h3>Resumen</h3>
                        <p><span>Total:</span> <strong id="resumenTotal">0</strong></p>
                        <p><span>Activos:</span> <strong id="resumenActivos">0</strong></p>
                        <p><span>Inactivos:</span> <strong id="resumenInactivos">0</strong></p>
                    </div>
                </div>
            </div>

            <div class="topbar clientes-topbar">
                <input type="text" id="buscarCliente" placeholder="Buscar cliente...">
            </div>

            <div class="historial">
                <h2>Lista de Clientes</h2>

                <table id="tablaClientes">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Teléfono</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/confirm-dialog.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/clientes.js"></script>
</body>

</html>
