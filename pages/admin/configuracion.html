<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - TecniTrack</title>
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../../js/auth.js"></script>
</head>

<body>
    <div class="sidebar"></div>

    <div class="content">
        <section class="panel-section active-section">
            <h1>Configuración</h1>

            <div class="cards">
                <div class="card">
                    <h3 id="totalUsuarios">0</h3>
                    <p>Usuarios Registrados</p>
                </div>

                <div class="card">
                    <h3>v1.0</h3>
                    <p>Versión del Sistema</p>
                </div>

                <div class="card">
                    <h3 id="estadoDatos">Local</h3>
                    <p>Estado de Datos</p>
                </div>

                <div class="card">
                    <h3 id="totalTickets">0</h3>
                    <p>Tickets de Soporte</p>
                </div>
            </div>

            <form class="form-container" id="formTaller">
                <h2>Datos del Taller</h2>

                <input type="text" id="nombreTaller" placeholder="Nombre del negocio" required>
                <input type="email" id="correoTaller" placeholder="Correo de soporte" required>
                <input type="text" id="direccionTaller" placeholder="Dirección del taller" required>
                <input type="text" id="telefonoTaller" placeholder="Teléfono directo" required>
                <input type="text" id="whatsappTaller" placeholder="WhatsApp" required>
                <input type="text" id="horarioTaller" placeholder="Horario de atención" required>

                <button type="submit">Guardar Datos del Taller</button>
            </form>

            <div class="historial">
                <h2>Gestión de Usuarios</h2>

                <table id="tablaUsuariosConfig">
                    <thead>
                        <tr>
                            <th>Usuario</th>
                            <th>Nombre</th>
                            <th>Rol</th>
                            <th>Correo</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="backup-panel">
                <div>
                    <h2>Respaldo de Datos</h2>
                    <p>Exporta solicitudes, tickets, datos del taller y usuarios guardados en localStorage.</p>
                </div>
                <button type="button" id="btnExportarBackup">
                    <i class="fa-solid fa-download"></i> Exportar JSON
                </button>
            </div>
        </section>
    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/configuracion.js"></script>
</body>

</html>
