<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturación - TecniTrack</title>
    <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg">
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="../../css/facturacion.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../../js/auth.js"></script>
</head>
<body>

    <div class="sidebar"></div>

    <div class="content">
        <div class="topbar">
            <h1>Facturación</h1>
            <input type="text" id="buscarFactura" placeholder="Buscar factura...">
        </div>

        <div class="facturacion-grid">
            <div class="factura-formulario">
                <h2>Generar Nueva Factura</h2>

                <div class="form-grid">
                    <select id="solicitudFactura" class="form-grid-full">
                        <option value="">Cargando órdenes completadas...</option>
                    </select>
                    <input type="text" id="numeroFactura" placeholder="N° Factura" readonly>
                    <input type="date" id="fechaFactura">

                    <input type="text" id="clienteFactura" placeholder="Cliente" readonly>
                    <select id="tecnicoFactura" disabled>
                        <option value="">Técnico asignado</option>
                    </select>

                    <input type="text" id="servicioFactura" placeholder="Servicio completado" readonly>
                    <input type="number" id="precioServicio" placeholder="Precio del servicio" min="0" step="0.01">
                </div>

                <h3>Productos y Repuestos</h3>

                <div class="productos-linea">
                    <input type="text" id="productoFactura" placeholder="Producto o repuesto">
                    <input type="number" id="cantidadProducto" placeholder="Cantidad" min="1">
                    <input type="number" id="precioProducto" placeholder="Precio" min="0" step="0.01">
                    <button id="btnAgregarProductoFactura">Añadir Producto</button>
                </div>

                <table id="tablaDetalleFactura">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

                <div class="acciones-factura">
                    <button id="btnGuardarFactura">Guardar Factura</button>
                    <button id="btnCancelarFactura" class="btn-cancelar">Cancelar</button>
                    <button id="btnImprimirFactura">Imprimir</button>
                </div>
            </div>

            <div class="factura-resumen">
                <div class="resumen-box">
                    <h3>Resumen de Pago</h3>
                    <p><span>Servicio</span> <span id="resumenServicio">$0.00</span></p>
                    <p><span>Repuestos</span> <span id="resumenRepuestos">$0.00</span></p>
                    <p><span>Subtotal</span> <span id="resumenSubtotal">$0.00</span></p>
                    <p class="total-linea"><span>Total:</span> <span id="resumenTotal">$0.00</span></p>
                </div>

                <div class="resumen-box">
                    <h3>Método de Pago</h3>
                    <select id="metodoPagoFactura">
                        <option value="Efectivo">Efectivo</option>
                        <option value="Transferencia">Transferencia</option>
                        <option value="Tarjeta">Tarjeta</option>
                    </select>

                    <select id="estadoFactura">
                        <option value="Pagado">Pagado</option>
                        <option value="Pendiente">Pendiente</option>
                    </select>

                    <select id="garantiaFactura">
                        <option value="30 Días">30 Días</option>
                        <option value="15 Días">15 Días</option>
                        <option value="Sin Garantía">Sin Garantía</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="historial">
            <h2>Historial de Facturas</h2>

            <table id="tablaFacturas">
                <thead>
                    <tr>
                        <th>N° Factura</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Técnico</th>
                        <th>Total</th>
                        <th>Método de Pago</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <div class="acciones-historial">
                <button id="btnHistorialFacturas">Historial de movimiento</button>
                <button id="btnExportarFacturas">Exportar Reporte</button>
            </div>
        </div>
    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/confirm-dialog.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/facturacion.js"></script>
</body>
</html>
