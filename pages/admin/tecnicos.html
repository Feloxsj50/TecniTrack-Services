<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Técnicos - TecniTrack</title>
    <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg">

    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="../../css/tecnicos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../../js/auth.js"></script>
</head>

<body>

    <!-- barra lateral -->
    <div class="sidebar"></div>

    <div class="content">

        <h1>Técnicos</h1>

        <!-- CARDS -->
        <div class="cards">
            <div class="card">
                <h3 id="totalTecnicos">0</h3>
                <p>Total Técnicos</p>
            </div>

            <div class="card">
                <h3 id="tecnicosActivos">0</h3>
                <p>Activos</p>
            </div>

            <div class="card">
                <h3 id="tecnicosInactivos">0</h3>
                <p>Inactivos</p>
            </div>
        </div>

        <!-- FORM -->
        <div class="form-container">
            <h2>Registrar Técnico</h2>

            <input type="text" id="nombreTecnico" placeholder="Nombre">
            <input type="text" id="usuarioTecnico" placeholder="Usuario">
            <input type="email" id="correoTecnico" placeholder="Correo electrónico">
            <input type="text" id="especialidadTecnico" placeholder="Especialidad">
            <input type="text" id="telefonoTecnico" placeholder="Teléfono 7777-8888" maxlength="9">
            <input type="password" id="passwordTecnico" placeholder="Contraseña temporal">

            <select id="estadoTecnico">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
            </select>

            <button id="btnGuardarTecnico">Guardar Técnico</button>
        </div>

        <!-- BUSCADOR -->
        <div class="topbar tecnicos-bar">
    <div class="buscador-box">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="buscarTecnico" placeholder="Buscar técnico...">
    </div>
        </div>

        <!-- TABLA -->
        <div class="historial">
            <h2>Lista de Técnicos</h2>

            <table id="tablaTecnicos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Especialidad</th>
                        <th>Teléfono</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr class="empty-row">
                        <td colspan="7">Cargando técnicos...</td>
                    </tr>
                </tbody>
            </table>
            <div class="pagination" id="paginacionTecnicos"></div>
        </div>

    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/confirm-dialog.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/pagination.js"></script>
    <script src="../../js/tecnicos.js"></script>
</body>

</html>
