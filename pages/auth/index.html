<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TecniTrack Services</title>
    <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg">
<link rel="stylesheet" href="../../css/style.css">

<!-- iconos -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../../js/auth.js"></script>
</head>
<body>

<div class="background"></div>

<div class="login-box">

    <div class="logo-area">
        <i class="fa-solid fa-laptop-code icon-logo"></i>
        <h2>TecniTrack <span>Services</span></h2>
    </div>

    <h1>Iniciar Sesión</h1>

    <div class="input-group">
        <i class="fa fa-user"></i>
        <input type="text" id= "usuario" placeholder="Usuario">
    </div>
    <div class="input-group">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Contraseña">
        <i class="fa fa-eye-slash toggle"></i>
    </div>
     <small id="passwordHelp"></small>

    <button class="btn-login">Entrar</button>

    <div class="options">
        <label>
            <input type="checkbox"> Recordarme
        </label>
        </div>
        
        <a href="#" class="forgot">¿Olvidaste la contraseña?</a>
         <!--Al tocar Registrarme te manda al menu de registro-->
        <a href="registro.html" class="forgot">Registrarme</a>

        <script src="../../js/notifications.js"></script>
        <script src="../../js/login.js"></script>
</body>
</html>
