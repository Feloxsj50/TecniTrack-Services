<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear Cuenta - TecniTrack</title>
    <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg">
<link rel="stylesheet" href="../../css/style.css">

<!-- iconos -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../../js/auth.js"></script>
</head>

<body class="register-page">

<div class="background"></div>

<div class="login-box">

    <div class="logo-area">
        <i class="fa-solid fa-laptop-code icon-logo"></i>
        <h2>TecniTrack <span>Services</span></h2>
    </div>

    <h1>Crear Cuenta</h1>

    <a href="index.html" class="forgot">
        ¿Ya tienes cuenta? Iniciar sesión
    </a>

    <div class="input-group">
        <i class="fa fa-user"></i>
        <input type="text" id="nombres" placeholder="Nombres">
    </div>
    <small id="nombresHelp"></small>

    <div class="input-group">
        <i class="fa fa-user"></i>
        <input type="text" id="apellidos" placeholder="Apellidos">
    </div>
    <small id="apellidosHelp"></small>

    <div class="input-group">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" placeholder="Correo Electrónico">
    </div>
    <small id="emailHelp"></small>

    <div class="input-group">
        <i class="fa fa-phone"></i>
        <input type="tel" id="telefono" placeholder="Teléfono">
    </div>
    <small id="telefonoHelp"></small>

    <div class="input-group">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Contraseña (mínimo 8)">
        <i class="fa fa-eye-slash toggle"></i>
    </div>
    <div class="strength-meter" aria-hidden="true">
        <span id="strengthBar"></span>
    </div>
    <small id="strengthText"></small>
    <small id="passwordHelp"></small>

    <div class="input-group">
        <i class="fa fa-lock"></i>
        <input type="password" id="confirmPassword" placeholder="Confirmar contraseña">
    </div>
    <small id="confirmPasswordHelp"></small>

    <button class="btn-login">Registrarme</button>

    </div>


<script src="../../js/notifications.js"></script>
<script src="../../js/registro.js"></script>

</body>
</html>
