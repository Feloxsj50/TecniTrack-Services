<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Cliente - TecniTrack</title>
    <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg">
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../../js/auth.js"></script>
</head>

<body>
    <div class="sidebar"></div>

    <div class="content">
        <section class="panel-section active-section">
            <h1>Panel Cliente</h1>

            <div class="cards">
                <div class="card">
                    <h3 id="totalServicios">0</h3>
                    <p>Servicios Solicitados</p>
                </div>

                <div class="card">
                    <h3 id="serviciosPendientes">0</h3>
                    <p>Pendientes</p>
                </div>

                <div class="card">
                    <h3 id="serviciosRevision">0</h3>
                    <p>En Proceso</p>
                </div>

                <div class="card">
                    <h3 id="serviciosCompletados">0</h3>
                    <p>Completados</p>
                </div>
            </div>

            <form class="form-container" id="formSolicitud">
                <h2>Solicitar Servicio</h2>

                <input type="text" id="nombreCliente" placeholder="Nombre del cliente" required>
                <input type="text" id="dispositivoCliente" placeholder="Dispositivo" required>
                <input type="text" id="problemaCliente" placeholder="Tipo de problema" required>
                <input type="date" id="fechaSolicitud" required>

                <button type="submit">Enviar Solicitud</button>
            </form>

            <div class="historial">
                <h2>Mis Servicios</h2>

                <table id="tablaServicios">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Dispositivo</th>
                            <th>Servicio</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="empty-row">
                            <td colspan="6">
                                <div class="empty-state">
                                    <i class="fa-solid fa-clipboard-list"></i>
                                    <strong>Sin servicios registrados</strong>
                                    <span>Cuando el cliente solicite o reciba un servicio, aparecerá aquí su historial.</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/cliente-panel.js"></script>
</body>

</html>
