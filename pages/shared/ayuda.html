<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayuda y Soporte - TecniTrack</title>
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../../js/auth.js"></script>
</head>

<body>
    <div class="sidebar"></div>

    <div class="content">
        <section class="panel-section active-section">
            <h1 id="ayudaTitulo">Ayuda y Soporte</h1>

            <div class="cards">
                <div class="card">
                    <h3 id="statPrincipal">0</h3>
                    <p id="statPrincipalTexto">Soporte</p>
                </div>

                <div class="card">
                    <h3 id="statCanal">Web</h3>
                    <p>Canal de Soporte</p>
                </div>

                <div class="card">
                    <h3 id="statTickets">0</h3>
                    <p id="statTicketsTexto">Tickets Abiertos</p>
                </div>

                <div class="card">
                    <h3 id="statTiempo">15m</h3>
                    <p>Tiempo Promedio</p>
                </div>
            </div>

            <form class="form-container" id="formSoporte">
                <h2 id="formTitulo">Enviar Solicitud</h2>

                <input type="text" id="soporteNombre" placeholder="Nombre" required>
                <input type="email" id="soporteCorreo" placeholder="Correo" required>
                <input type="text" id="soporteAsunto" placeholder="Asunto" required>
                <select id="soporteArea" required></select>
                <input type="text" id="soporteDetalle" placeholder="Detalle breve" required>

                <button type="submit" id="btnSoporte">Enviar Mensaje</button>
            </form>

            <div class="historial" id="ticketsSoporte">
                <h2 id="ticketsTitulo">Tickets de Soporte</h2>

                <table id="tablaTickets">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Area</th>
                            <th>Asunto</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/ayuda.js"></script>
</body>

</html>
