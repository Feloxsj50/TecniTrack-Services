<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Trabajos - TecniTrack</title>
    <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg">
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../../js/auth.js"></script>
</head>

<body>
    <div class="sidebar"></div>

    <div class="content">
        <section class="panel-section active-section">
            <h1>Mis Trabajos</h1>

            <div class="cards">
                <div class="card"><h3 id="historialTotal">0</h3><p>Total Atendidos</p></div>
                <div class="card"><h3 id="historialMes">0</h3><p>Este Mes</p></div>
                <div class="card"><h3 id="historialAlta">0</h3><p>Prioridad Alta</p></div>
                <div class="card"><h3 id="historialRepuestos">0</h3><p>Con Repuestos</p></div>
            </div>

            <div class="historial">
                <h2>Historial completado</h2>
                <table id="tablaServicios">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Dispositivo</th>
                            <th>Servicio</th>
                            <th>Prioridad</th>
                            <th>Repuesto</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div class="pagination" id="paginacionTrabajos"></div>
            </div>
        </section>
    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/pagination.js"></script>
    <script src="../../js/mis-trabajos.js"></script>
</body>

</html>
