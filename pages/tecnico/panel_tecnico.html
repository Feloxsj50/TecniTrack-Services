<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Técnico - TecniTrack</title>
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../../js/auth.js"></script>
</head>

<body>
    <div class="sidebar"></div>

    <div class="content">
        <section class="panel-section active-section">
            <h1>Panel Técnico</h1>

            <div class="cards">
                <div class="card">
                    <h3 id="totalAsignados">0</h3>
                    <p>Servicios Asignados</p>
                </div>

                <div class="card">
                    <h3 id="totalProceso">0</h3>
                    <p>En Proceso</p>
                </div>

                <div class="card">
                    <h3 id="totalCompletados">0</h3>
                    <p>Completados</p>
                </div>

                <div class="card">
                    <h3 id="totalPendientes">0</h3>
                    <p>Pendientes</p>
                </div>
            </div>

            <form class="form-container" id="formTecnico">
                <h2>Actualizar Servicio</h2>

                <input type="text" id="idServicioTecnico" placeholder="ID del servicio" readonly>
                <input type="text" id="diagnosticoTecnico" placeholder="Diagnostico">
                <input type="text" id="repuestoTecnico" placeholder="Repuesto utilizado">
                <select id="estadoTecnico">
                    <option value="En Proceso">En Proceso</option>
                    <option value="Completado">Completado</option>
                </select>

                <button type="submit">Guardar Actualización</button>
            </form>

            <div class="historial">
                <h2>Servicios Asignados</h2>

                <table id="tablaServicios">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Dispositivo</th>
                            <th>Servicio</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/tecnico-panel.js"></script>
</body>

</html>
